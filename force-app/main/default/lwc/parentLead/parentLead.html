<template>
    <lightning-card title="Leads">
        <lightning-datatable
            key-field="Id"
            data={leads}
            columns={columns}
            onrowaction={handleRowAction}>
        </lightning-datatable>
    </lightning-card>

    <!-- 🔥 CHILD CREATED ONLY WHEN leadId EXISTS -->
    <template if:true={editingLeadId}>
        <c-lead-edit-modal
            lead-id={editingLeadId}
            onclose={handleModalClose}
            onsuccess={handleUpdateSuccess}>
        </c-lead-edit-modal>
    </template>
</template>
