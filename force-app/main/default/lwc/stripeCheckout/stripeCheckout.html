<template>
    <lightning-card title="Secure Payment">
        <div class="slds-p-around_medium">

            <template if:true={orderTotal}>
                <p><strong>Order Total:</strong> ₹ {orderTotal}</p>

                <lightning-button
                    variant="brand"
                    label="Pay Securely"
                    onclick={handlePayment}
                    disabled={isLoading}>
                </lightning-button>
            </template>

            <template if:true={isLoading}>
                <p class="slds-m-top_medium">
                    Redirecting to secure Stripe...
                </p>
            </template>

        </div>
    </lightning-card>
</template>
