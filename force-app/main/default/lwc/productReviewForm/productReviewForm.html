<template>

    <!-- BUTTON VIEW -->
    <template if:false={showModal}>
        <div class="review-entry">

            <h2 class="title">Review this product</h2>
            <p class="subtitle">Share your thoughts with other customers</p>

            <button class="review-btn" onclick={openModal}>
                Write a product review
            </button>

        </div>
    </template>


    <!-- MODAL -->
    <template if:true={showModal}>

        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">

                <!-- HEADER -->
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">
                        Write a Review
                    </h2>
                </header>

                <!-- BODY -->
                <div class="slds-modal__content slds-p-around_medium">

                    <!-- Name -->
                    <lightning-input 
                        label="Name"
                        value={name}
                        onchange={handleInputChange}
                        data-field="name"
                        required>
                    </lightning-input>

                    <!-- ⭐ STARS -->
                    <label class="slds-form-element__label slds-m-top_medium">Rating</label>
                    <div class="star-container">
                        <template for:each={starList} for:item="star">
                            <span 
                                key={star.value}
                                data-value={star.value}
                                onclick={handleStarClick}
                                onmouseover={handleMouseOver}
                                onmouseout={handleMouseOut}
                                class={star.class}>
                                ★
                            </span>
                        </template>
                    </div>

                    <!-- Summary -->
                    <lightning-input 
                        label="Summary"
                        value={summary}
                        onchange={handleInputChange}
                        data-field="summary">
                    </lightning-input>

                    <!-- Review -->
                    <lightning-textarea 
                        label="Review"
                        value={review}
                        onchange={handleInputChange}
                        data-field="review">
                    </lightning-textarea>

                </div>

                <!-- FOOTER -->
                <footer class="slds-modal__footer">

                    <lightning-button 
                        label="Cancel" 
                        onclick={closeModal}>
                    </lightning-button>

                    <lightning-button 
                        variant="brand" 
                        label="Submit Review"
                        onclick={handleSubmit}
                        disabled={isSubmitting}>
                    </lightning-button>

                </footer>

            </div>
        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>

    </template>

</template>
