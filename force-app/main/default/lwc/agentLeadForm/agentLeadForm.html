<template>

    <!-- ================= CREATE FORM ================= -->
    <lightning-card title="Quick Lead">
        <div class="slds-p-around_medium">
            <div class="slds-grid slds-wrap">

                <!-- First Name -->
                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                    <lightning-input
                        label="First Name"
                        value={firstName}
                        onchange={handleChange}
                        data-field="firstName">
                    </lightning-input>
                </div>

                <!-- Last Name -->
                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                    <lightning-input
                        label="Last Name *"
                        value={lastName}
                        onchange={handleChange}
                        data-field="lastName"
                        required>
                    </lightning-input>
                </div>

                <!-- Email -->
                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                    <lightning-input
                        label="Email *"
                        type="email"
                        value={email}
                        onchange={handleEmailChange}
                        required>
                    </lightning-input>
                </div>

                <!-- Phone -->
                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                    <lightning-input
                        label="Phone"
                        value={phone}
                        onchange={handleChange}
                        data-field="phone">
                    </lightning-input>
                </div>

                <!-- Campus -->
                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small slds-m-top_small">
                    <label class="slds-form-element__label">Preferred Campus</label>
                    <lightning-input
                        value={campusSearchText}
                        onchange={handleCampusSearch}>
                    </lightning-input>

                    <template if:true={campusResults.length}>
                        <ul class="slds-list_horizontal slds-wrap slds-m-top_x-small">
                            <template for:each={campusResults} for:item="c">
                                <li
                                    key={c.Id}
                                    class="slds-box slds-m-right_small campus-pill"
                                    data-id={c.Id}
                                    onclick={selectCampus}>
                                    {c.Name}
                                </li>
                            </template>
                        </ul>
                    </template>
                </div>

                <!-- Course -->
                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small slds-m-top_small">
                    <lightning-combobox
                        label="Preferred Course"
                        options={courseOptions}
                        value={selectedCourseId}
                        onchange={handleCourseChange}
                        disabled={courseDisabled}>
                    </lightning-combobox>
                </div>

                <!-- Notes -->
                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small slds-m-top_small">
                    <lightning-textarea
                        label="Notes"
                        value={notes}
                        onchange={handleChange}
                        data-field="notes">
                    </lightning-textarea>
                </div>

            </div>

            <!-- Buttons -->
            <div class="slds-m-top_medium slds-grid slds-grid_align-end">
                <lightning-button
                    label="Reset"
                    onclick={resetForm}
                    class="slds-m-right_small">
                </lightning-button>

                <lightning-button
                    variant="brand"
                    label="Save Lead"
                    onclick={saveLead}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>


    <!-- ================= LEADS TABLE ================= -->
    <lightning-card title="Leads" class="slds-m-top_large">
        <lightning-datatable
            key-field="Id"
            data={leads}
            columns={columns}
            onrowaction={handleRowAction}
            hide-checkbox-column>
        </lightning-datatable>
    </lightning-card>


    <!-- ================= EDIT MODAL ================= -->
    <template if:true={showEditModal}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container slds-modal_large">

                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Edit Lead</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <div class="slds-grid slds-wrap">

                        <!-- First Name (READ-ONLY in edit) -->
                        <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                            <lightning-input
                                label="First Name"
                                value={firstName}
                                disabled={isEditMode}
                                data-field="firstName">
                            </lightning-input>
                        </div>

                        <!-- Last Name (READ-ONLY in edit) -->
                        <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                            <lightning-input
                                label="Last Name *"
                                value={lastName}
                                disabled={isEditMode}
                                data-field="lastName"
                                required>
                            </lightning-input>
                        </div>

                        <!-- Email (READ-ONLY in edit) -->
                        <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                            <lightning-input
                                label="Email *"
                                type="email"
                                value={email}
                                disabled={isEditMode}
                                required>
                            </lightning-input>
                        </div>

                        <!-- Phone (READ-ONLY in edit) -->
                        <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                            <lightning-input
                                label="Phone"
                                value={phone}
                                disabled={isEditMode}
                                data-field="phone">
                            </lightning-input>
                        </div>

                        <!-- Campus (Editable) -->
                        <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small slds-m-top_small">
                            <label class="slds-form-element__label">Preferred Campus</label>
                            <lightning-input
                                value={campusSearchText}
                                onchange={handleCampusSearch}>
                            </lightning-input>

                            <template if:true={campusResults.length}>
                                <ul class="slds-list_horizontal slds-wrap slds-m-top_x-small">
                                    <template for:each={campusResults} for:item="c">
                                        <li
                                            key={c.Id}
                                            class="slds-box campus-pill"
                                            data-id={c.Id}
                                            onclick={selectCampus}>
                                            {c.Name}
                                        </li>
                                    </template>
                                </ul>
                            </template>
                        </div>

                        <!-- Course (Editable) -->
                        <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small slds-m-top_small">
                            <lightning-combobox
                                label="Preferred Course"
                                options={courseOptions}
                                value={selectedCourseId}
                                onchange={handleCourseChange}
                                disabled={courseDisabled}>
                            </lightning-combobox>
                        </div>

                        <!-- Notes (Editable) -->
                        <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small slds-m-top_small">
                            <lightning-textarea
                                label="Notes"
                                value={notes}
                                onchange={handleChange}
                                data-field="notes">
                            </lightning-textarea>
                        </div>

                    </div>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Cancel"
                        onclick={closeModal}>
                    </lightning-button>

                    <lightning-button
                        variant="brand"
                        label="Update"
                        onclick={saveLead}>
                    </lightning-button>
                </footer>

            </div>
        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

</template>
