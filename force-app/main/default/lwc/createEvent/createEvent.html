    <lightning-record-edit-form 
        object-api-name="Events__c" 
        onsuccess={handleSuccess} >
        
        <lightning-input-field field-name="Name"></lightning-input-field>
        <lightning-input-field field-name="Event_Date__c"></lightning-input-field>
        <lightning-input-field field-name="Location__c"></lightning-input-field>
        <lightning-input-field field-name="Maximum_Capacity__c"></lightning-input-field>

        <lightning-button type="submit" label="Submit" class="slds-m-top_medium"></lightning-button>
        <lightning-button variant="neutral" label="Cancel" onclick={handleCancel} class="slds-m-left_small"></lightning-button>
    </lightning-record-edit-form>
</template>
