<template>
    <lightning-card title="Select Role" icon-name="standard:user">
        <div class="slds-p-around_medium">
            <lightning-combobox
                name="role"
                label="Choose Your Role"
                value={selectedRole}
                placeholder="Select Role"
                options={roleOptions}
                onchange={handleChange}>
            </lightning-combobox>

            <lightning-button
                variant="brand"
                label="Continue"
                class="slds-m-top_medium"
                onclick={handleNavigation}>
            </lightning-button>
        </div>
    </lightning-card>
</template>
