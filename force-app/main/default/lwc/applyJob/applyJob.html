<template>
    <lightning-button label="Apply Now" onclick={openModal} variant="brand"></lightning-button>

    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <!-- Modal Header -->
                <header class="slds-modal__header">
                    <h2 class="slds-modal__title">New Application</h2>
                </header>

                <!-- Modal Body -->
                <div class="slds-modal__content">
                    <lightning-record-edit-form
                        object-api-name="Application__c"
                        onsuccess={handleSuccess}
                    >
                        <!-- Prefill JobAdvertisement__c with current recordId -->
                        <lightning-input-field
                            field-name="JobAdvertisement__c"
                            value={recordId}
                        ></lightning-input-field>

                        <lightning-input-field field-name="Name"></lightning-input-field>
                        <lightning-input-field field-name="Contact_Number__c"></lightning-input-field>
                        <lightning-input-field field-name="Email_ID__c"></lightning-input-field>
                        <lightning-input-field field-name="Years_of_Experience__c"></lightning-input-field>

                        <!-- Buttons -->
                        <div class="slds-modal__footer">
                            <lightning-button label="Cancel" onclick={closeModal} class="slds-m-right_small"></lightning-button>
                            <lightning-button type="submit" variant="brand" label="Submit"></lightning-button>
                        </div>
                    </lightning-record-edit-form>
                </div>
            </div>
        </section>

        <!-- Backdrop -->
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
