<template>
    <section class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <header class="slds-modal__header">
                <h2 class="slds-text-heading_medium">Edit Lead</h2>
            </header>

            <div class="slds-modal__content slds-p-around_medium">
                <lightning-input label="First Name" value={firstName} onchange={handleChange} data-field="firstName"></lightning-input>
                <lightning-input label="Last Name" value={lastName} onchange={handleChange} data-field="lastName" required></lightning-input>
                <lightning-input label="Email" value={email} onchange={handleChange} data-field="email"></lightning-input>
                <lightning-input label="Phone" value={phone} onchange={handleChange} data-field="phone"></lightning-input>
                <lightning-textarea label="Notes" value={notes} onchange={handleChange} data-field="notes"></lightning-textarea>
            </div>

            <footer class="slds-modal__footer">
                <lightning-button label="Cancel" onclick={close}></lightning-button>
                <lightning-button variant="brand" label="Update" onclick={updateLead}></lightning-button>
            </footer>
        </div>
    </section>

    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
