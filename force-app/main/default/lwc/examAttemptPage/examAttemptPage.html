<template>
    <lightning-card title={questionTitle}>
        <div class="exam-layout">
            <!-- Left: Question area -->
            <div class="question-area">
                <template if:true={loaded}>

                    <!-- Question text -->
                    <div class="q-header">
                        <div class="q-text">
                            {currentQuestion.questionText}
                        </div>
                    </div>

                    <!-- Single choice -->
                    <template if:true={isSingle}>
                        <lightning-radio-group
                            name="options"
                            options={radioOptions}
                            value={selectedValues}
                            onchange={handleRadioChange}>
                        </lightning-radio-group>
                    </template>

                    <!-- Multiple choice -->
                    <template if:true={isMultiple}>
                        <template for:each={currentQuestion.options} for:item="opt">
                            <div key={opt.optionId}>
                                <lightning-input 
                                    type="checkbox"
                                    label={opt.label}
                                    checked={opt.checked}
                                    data-id={opt.optionId}
                                    onchange={handleCheckboxChange}>
                                </lightning-input>
                            </div>
                        </template>
                    </template>

                    <!-- Action buttons -->
                    <div class="action-buttons">
                        <lightning-button label="Back" onclick={handleBack} class="small"></lightning-button>
                        <lightning-button label="Save And Next" variant="brand" onclick={handleSaveNext} class="small"></lightning-button>
                        <lightning-button label="Mark for Review" onclick={handleMarkForReview} class="small"></lightning-button>
                        <lightning-button label="Clear Response" onclick={handleClearResponse} class="small"></lightning-button>
                    </div>
                </template>

                <template if:false={loaded}>
                    <div>Loading questions...</div>
                </template>
            </div>

            <!-- Right: Navigation panel -->
            <div class="nav-grid">
                <template for:each={questions} for:item="q" for:index="idx">
                    <button 
                        key={q.questionId}
                        data-index={idx}
                        class={q.computedClass}
                        title={q.title}
                        onclick={handleNavigate}>
                        {q.number}
                    </button>
                </template>
            </div>

            <!-- Submit button -->
            <div class="submit-area">
                <lightning-button label="Submit Exam" variant="brand" onclick={handleSubmit}></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
