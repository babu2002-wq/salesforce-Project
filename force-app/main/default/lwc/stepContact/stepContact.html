<template>
    <lightning-input label="First Name" data-field="FirstName" required onchange={handleContact}></lightning-input>
<lightning-input label="Last Name" data-field="LastName" required onchange={handleContact}></lightning-input>
<lightning-input label="Email" data-field="Email" type="email" required onchange={handleContact}></lightning-input>


<lightning-file-upload
    label="Upload Resume"
    accept=".pdf,.doc,.docx"
    onuploadfinished={handleUpload}>
</lightning-file-upload>

<p if:true={fileError} class="slds-text-color_error">
    Resume upload is required
</p>

<div class="slds-m-top_medium">
    <lightning-button label="Previous" onclick={previous}></lightning-button>
    <lightning-button
        variant="brand"
        label="Next"
        disabled={disableNext}
        onclick={next}>
    </lightning-button>
</div>


    
</template>
